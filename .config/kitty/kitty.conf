# --------------------------------------------------
# Font
# --------------------------------------------------

font_family JetBrainsMono Nerd Font
font_size 14.0


# --------------------------------------------------
# Kanagawa theme
# --------------------------------------------------

foreground #c5c9c5
background #181616

# Reverse-video cursor, equivalent to:
# force_reverse_video_cursor = true
cursor none
cursor_shape block

selection_foreground #C8C093
selection_background #2D4F67

# Normal ANSI colors
color0 #0D0C0C
color1 #C4746E
color2 #8A9A7B
color3 #C4B28A
color4 #8BA4B0
color5 #A292A3
color6 #8EA4A2
color7 #C8C093

# Bright ANSI colors
color8  #A6A69C
color9  #E46876
color10 #87A987
color11 #E6C384
color12 #7FB4CA
color13 #938AA9
color14 #7AA89F
color15 #C5C9C5


# --------------------------------------------------
# Tabs and splits
# --------------------------------------------------

# Completely hide the tab bar
tab_bar_style hidden

# Closest equivalent to WezTerm's split color
active_border_color #16161D
inactive_border_color #16161D

# Avoid displaying a border around a single terminal pane
draw_minimal_borders yes


# --------------------------------------------------
# Background translucency
# --------------------------------------------------

background_opacity 0.8
background_blur 50


# --------------------------------------------------
# Window appearance
# --------------------------------------------------

# Closest macOS equivalent to WezTerm's "RESIZE"
hide_window_decorations titlebar-only

window_padding_width 12
placement_strategy center


# --------------------------------------------------
# Rendering
# --------------------------------------------------

# Approximately 60 FPS
repaint_delay 16
sync_to_monitor yes

cursor_trail 2
